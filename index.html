<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orion" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Orion Escala</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force cache bust on deploy v3
      if (localStorage.getItem('orion_cache_v') !== '3') {
        localStorage.clear();
        if ('caches' in window) caches.keys().then(function(k){k.forEach(function(c){caches.delete(c)})});
        if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})});
        localStorage.setItem('orion_cache_v', '3');
        location.reload();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
